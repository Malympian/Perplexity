<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
      background: #f5f5f5;
    }
    
    .container {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    h1 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #1a1a1a;
    }
    
    .control-group {
      margin-bottom: 20px;
    }
    
    label {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: #333;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      cursor: pointer;
    }
    
    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 26px;
      margin-top: 8px;
    }
    
    input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4a90e2;
      cursor: pointer;
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4a90e2;
      cursor: pointer;
      border: none;
    }
    
    .value-display {
      min-width: 35px;
      text-align: right;
      font-size: 12px;
      font-weight: 600;
      color: #4a90e2;
    }
    
    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      resize: vertical;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
    }
    
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-process {
      background: #4a90e2;
      color: white;
    }
    
    .btn-process:hover {
      background: #357abd;
    }
    
    .btn-copy {
      background: #e0e0e0;
      color: #333;
    }
    
    .btn-copy:hover {
      background: #d0d0d0;
    }
    
    .output-section {
      margin-top: 16px;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
    
    .output-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }
    
    #output {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      word-break: break-word;
      white-space: pre-wrap;
      box-sizing: border-box;
      resize: vertical;
    }
    
    .copy-feedback {
      display: none;
      font-size: 11px;
      color: #4a90e2;
      margin-top: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Text Obfuscator</h1>
    
    <div class="control-group">
      <label>
        <input type="checkbox" id="hairsBetween" checked>
        Invisible hairs between words
      </label>
      <div class="slider-container">
        <input type="range" id="freqBetween" min="0" max="100" value="0">
        <span class="value-display"><span id="valBetween">0</span>%</span>
      </div>
    </div>
    
    <div class="control-group">
      <label>
        <input type="checkbox" id="hairsWithin" checked>
        Invisible hairs within words
      </label>
      <div class="slider-container">
        <input type="range" id="freqWithin" min="0" max="100" value="0">
        <span class="value-display"><span id="valWithin">0</span>%</span>
      </div>
    </div>
    
    <div class="control-group">
      <label>
        <input type="checkbox" id="homoglyphs" checked>
        Homoglyph substitution
      </label>
      <div class="slider-container">
        <input type="range" id="freqHomoglyph" min="0" max="100" value="0">
        <span class="value-display"><span id="valHomoglyph">0</span>%</span>
      </div>
    </div>
    
    <textarea id="input" placeholder="Paste text here..."></textarea>
    
    <div class="button-group">
      <button class="btn-process" id="btnProcess">Obfuscate</button>
      <button class="btn-copy" id="btnCopy">Copy</button>
    </div>
    
    <div class="output-section">
      <div class="output-label">Output:</div>
      <div id="output"></div>
      <div class="copy-feedback" id="feedback">Copied to clipboard!</div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
